<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agentic Search</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='14' cy='14' r='9' fill='none' stroke='%23d97757' stroke-width='3.5'/%3E%3Cline x1='21' y1='21' x2='28' y2='28' stroke='%23d97757' stroke-width='3.5' stroke-linecap='round'/%3E%3C/svg%3E">
<link rel="stylesheet" href="/static/style.css?v=2">
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
</head>
<body>
<header class="topbar">
  <div class="brand">Agentic <span>Search</span></div>
  <div class="topbar-right">
    <select id="modelSelect" class="model-select" title="Model"></select>
    <button id="addModelBtn" class="ghost-btn" title="Add a temporary model">+ Model</button>
    <button id="newChatBtn" class="ghost-btn" title="New chat">New chat</button>
  </div>
</header>

<main id="chat" class="chat">
  <div id="empty" class="empty">
    <h1>What would you like to search?</h1>
    <p>I check whether your question is clear, rewrite the query, search and read pages over multiple steps, then answer with source citations.</p>
  </div>
</main>

<footer class="composer-wrap">
  <div class="composer">
    <textarea id="input" rows="1" placeholder="Ask anything…"></textarea>
    <button id="sendBtn" class="send-btn" title="Send">
      <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M3.4 20.4l17.4-7.5c.8-.4.8-1.5 0-1.8L3.4 3.6c-.7-.3-1.4.3-1.4 1l0 4.6c0 .5.4.9.9 1L15 12 2.9 13.8c-.5.1-.9.5-.9 1l0 4.6c0 .7.7 1.3 1.4 1z"/></svg>
    </button>
    <button id="stopBtn" class="stop-btn hidden" title="Stop">
      <svg viewBox="0 0 24 24" width="16" height="16"><rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor"/></svg>
    </button>
  </div>
  <div class="footnote">AI-generated answers — please verify the sources</div>
</footer>

<div id="hovercard" class="hovercard hidden"></div>

<div id="modelModal" class="modal-overlay hidden">
  <div class="modal">
    <h2>Add a model</h2>
    <p class="modal-note">Stored in this tab only — gone after a refresh.</p>
    <label>Model name<input id="mName" type="text" placeholder="e.g. deepseek-chat"></label>
    <label>Base URL<input id="mBase" type="text" placeholder="e.g. https://api.deepseek.com/v1"></label>
    <label>API key<input id="mKey" type="password" placeholder="sk-…"></label>
    <div class="modal-actions">
      <button id="mCancel" class="ghost-btn">Cancel</button>
      <button id="mSave" class="solid-btn">Save</button>
    </div>
  </div>
</div>
<script src="/static/app.js?v=2"></script>
</body>
</html>
